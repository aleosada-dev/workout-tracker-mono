appId: ${MAESTRO_APP_ID}
name: 10 - Detalhe - badge de músculos visível
---
- runFlow: ../../subflows/open-exercises-list-athlete.yaml
- tapOn:
    id: "exercises-list.search"
- inputText: "Barra fixa na máquina"
- tapOn:
    id: "exercise-card"
    index: 0
- extendedWaitUntil:
    visible:
      id: "exercise-detail"
    timeout: 15000
- assertVisible:
    id: "exercise-detail.muscle.primary"
- assertVisible:
    id: "exercise-detail.muscle.secondary"