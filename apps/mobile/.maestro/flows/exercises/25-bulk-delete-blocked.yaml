appId: ${MAESTRO_APP_ID}
name: 25 - Bulk delete bloqueado em exercício público
# Validação: só donos podem deletar. Selecionar um público e tentar excluir
# deve mostrar toast de erro.
---
- runFlow: ../../subflows/open-exercises-list-athlete.yaml
- tapOn:
    id: "exercises-list.search"
- inputText: ${E2E_EXERCISE_PUBLIC}
- longPressOn:
    id: "exercise-card"
    index: 0
- assertVisible: "Cancelar"
- tapOn: "Excluir"
- extendedWaitUntil:
    visible: "Seleção inválida"
    timeout: 5000
- tapOn: "Cancelar"
