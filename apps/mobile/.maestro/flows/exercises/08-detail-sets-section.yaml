appId: ${MAESTRO_APP_ID}
name: 08 - Detalhe - seção de séries da última sessão
---
- runFlow: ../../subflows/open-exercises-list-athlete.yaml
- tapOn:
    id: "exercises-list.search"
- inputText: "Barra fixa na máquina"
- tapOn:
    id: "exercise-card"
    index: 0
- extendedWaitUntil:
    visible:
      id: "exercise-detail"
    timeout: 15000
- assertVisible: "Tipo"
- assertVisible: "Reps"
- assertVisible: "Peso"