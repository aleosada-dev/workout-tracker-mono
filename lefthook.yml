pre-commit:
  skip: false
  piped: true
  jobs:
    - name: biome
      glob: "*.{js,jsx,ts,tsx,json,jsonc}"
      run: bunx biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true

    - name: typecheck
      glob: "*.{ts,tsx}"
      run: bun run typecheck

    - name: test
      glob: "*.{ts,tsx,js,jsx}"
      run: bun run test
